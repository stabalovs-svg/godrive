<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>CRM Автошкола</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .hidden { display: none; }
        form { margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background-color: #f4f4f4; }
    </style>
</head>
<body>

    <!-- 1. ФОРМА ВХОДА (показывается по умолчанию) -->
    <div id="login-block">
        <h2>Вход в CRM Автошколы</h2>
        <form id="login-form">
            <input type="email" id="email" placeholder="Email" required><br><br>
            <input type="password" id="password" placeholder="Пароль" required><br><br>
            <button type="submit">Войти</button>
        </form>
        <div id="demo-block" style="margin-top:10px;">
            <input type="text" id="demo-code" placeholder="Введите код демодоступа" style="width:250px;">
            <button id="demo-submit" type="button">Открыть данные</button>
        </div>
        <div id="status" style="font-size:0.9em; color:#666; margin-top:8px;">Введите код доступа и нажмите «Открыть данные».</div>
    </div>

    <!-- 2. ИНТЕРФЕЙС CRM (скрыт до авторизации) -->
    <div id="crm-block" class="hidden">
        <h2>Список учеников автошколы</h2>
        <button id="logout-btn">Выйти из системы</button>
        
        <table id="students-table">
            <thead>
                <tr>
                    <th>ФИО</th>
                    <th>Телефон</th>
                    <th>Договор</th>
                    <th>Категория</th>
                    <th>Статус</th>
                </tr>
            </thead>
            <tbody>
                <!-- Сюда JavaScript вставит данные из базы -->
            </tbody>
        </table>
    </div>

    <script>
        const SUPABASE_URL = 'https://xcqrluiqllsnhtyojuhc.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhjcXJsdWlxbGxzbmh0eW9qdWhjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEwMTI2MjMsImV4cCI6MjA5NjU4ODYyM30.UOQA2kSLI6-lmlbsHCKjbWuNi5gbSGRiJijWbtiqqdQ';
        const DEMO_ACCESS_KEY = 'godrive-demo';

        let supabase = null;
        const loginBlock = document.getElementById('login-block');
        const crmBlock = document.getElementById('crm-block');
        const loginForm = document.getElementById('login-form');
        const logoutBtn = document.getElementById('logout-btn');
        const studentsTableBody = document.querySelector('#students-table tbody');

        // Инициализация Supabase с проверкой
        async function initSupabase() {
            try {
                if (typeof window.supabase === 'undefined') {
                    console.log('Supabase library loading...');
                    // Ждём загрузки библиотеки
                    await new Promise((resolve) => {
                        const interval = setInterval(() => {
                            if (typeof window.supabase !== 'undefined') {
                                clearInterval(interval);
                                resolve();
                            }
                        }, 100);
                        // Таймаут 5 секунд
                        setTimeout(() => clearInterval(interval), 5000);
                    });
                }
                
                if (typeof window.supabase !== 'undefined') {
                    supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
                    console.log('Supabase initialized successfully');
                }
            } catch (error) {
                console.error('Error initializing Supabase:', error);
            }
        }

        function showLogin() {
            loginBlock.classList.remove('hidden');
            crmBlock.classList.add('hidden');
        }

        function showCRM() {
            loginBlock.classList.add('hidden');
            crmBlock.classList.remove('hidden');
            loadStudents();
        }

        async function loadStudents() {
            studentsTableBody.innerHTML = '<tr><td colspan="5">Загрузка данных...</td></tr>';

            if (!supabase) {
                studentsTableBody.innerHTML = '<tr><td colspan="5">Демо-режим: данные не доступны без Supabase</td></tr>';
                return;
            }

            try {
                const { data, error } = await supabase
                    .from('students')
                    .select('id, full_name, phone, contract_number, category, status')
                    .order('created_at', { ascending: false });

                if (error) {
                    studentsTableBody.innerHTML = `<tr><td colspan="5">Ошибка загрузки: ${error.message}</td></tr>`;
                    return;
                }

                if (!data || data.length === 0) {
                    studentsTableBody.innerHTML = '<tr><td colspan="5">Нет данных</td></tr>';
                    return;
                }

                studentsTableBody.innerHTML = data.map(student => `
                    <tr>
                        <td>${student.full_name || ''}</td>
                        <td>${student.phone || ''}</td>
                        <td>${student.contract_number || ''}</td>
                        <td>${student.category || ''}</td>
                        <td>${student.status || ''}</td>
                    </tr>
                `).join('');
            } catch (error) {
                studentsTableBody.innerHTML = `<tr><td colspan="5">Ошибка: ${error.message}</td></tr>`;
            }
        }

        function getDemoKeyFromUrl() {
            return new URLSearchParams(window.location.search).get('demo');
        }

        function isDemoMode() {
            return localStorage.getItem('demoMode') === '1' || getDemoKeyFromUrl() === DEMO_ACCESS_KEY;
        }

        function enableDemoMode() {
            localStorage.setItem('demoMode', '1');
            showCRM();
            setStatus('Демо-режим активирован. Если данные не загружаются, отображаются демонстрационные данные.');
        }

        async function checkSession() {
            if (isDemoMode()) {
                enableDemoMode();
                return;
            }

            if (!supabase) {
                showLogin();
                return;
            }

            try {
                const {
                    data: { session },
                    error
                } = await supabase.auth.getSession();

                if (error) {
                    console.error('Session check error:', error.message);
                    showLogin();
                    return;
                }

                if (session) {
                    showCRM();
                } else {
                    showLogin();
                }
            } catch (error) {
                console.error('Error checking session:', error);
                showLogin();
            }
        }

        loginForm.addEventListener('submit', async (event) => {
            event.preventDefault();
            
            if (!supabase) {
                alert('Ошибка: Supabase не инициализирован');
                return;
            }

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                const { error } = await supabase.auth.signInWithPassword({ email, password });
                if (error) {
                    alert('Ошибка входа: ' + error.message);
                    return;
                }
                showCRM();
            } catch (error) {
                alert('Ошибка входа: ' + error.message);
            }
        });

        logoutBtn.addEventListener('click', async () => {
            if (isDemoMode()) {
                localStorage.removeItem('demoMode');
                showLogin();
                return;
            }

            if (!supabase) {
                showLogin();
                return;
            }

            try {
                const { error } = await supabase.auth.signOut();
                if (error) {
                    alert('Ошибка при выходе: ' + error.message);
                    return;
                }
                showLogin();
            } catch (error) {
                alert('Ошибка при выходе: ' + error.message);
            }
        });

        // Обработчики для демо-доступа
        const demoSubmit = document.getElementById('demo-submit');
        const demoCodeInput = document.getElementById('demo-code');
        const statusElement = document.getElementById('status');

        function setStatus(text, error = false) {
            statusElement.textContent = text;
            statusElement.style.color = error ? '#c00' : '#666';
        }

        function renderFallbackData() {
            const sample = [{
                full_name: 'Демо Ученик',
                phone: '+7 900 000-00-00',
                contract_number: 'DEMO-001',
                category: 'B',
                status: 'Демонстрационный'
            }];
            studentsTableBody.innerHTML = sample.map(student => `
                <tr>
                    <td>${student.full_name}</td>
                    <td>${student.phone}</td>
                    <td>${student.contract_number}</td>
                    <td>${student.category}</td>
                    <td>${student.status}</td>
                </tr>
            `).join('');
        }

        demoSubmit.addEventListener('click', () => {
            const key = demoCodeInput.value.trim();
            if (key === DEMO_ACCESS_KEY) {
                enableDemoMode();
                setStatus('Доступ открыт. Если данные не загружаются, отображаются демонстрационные данные.');
            } else {
                setStatus('Неверный код доступа.', true);
                demoCodeInput.value = '';
                demoCodeInput.focus();
            }
        });

        // Позволяем Enter в поле ввода
        demoCodeInput.addEventListener('keypress', (event) => {
            if (event.key === 'Enter') {
                demoSubmit.click();
            }
        });

        async function loadStudents() {
            studentsTableBody.innerHTML = '<tr><td colspan="5">Загрузка данных...</td></tr>';

            if (!supabase || isDemoMode()) {
                setStatus('Демо-режим активен. Отображаются демонстрационные данные.');
                renderFallbackData();
                return;
            }

            try {
                const { data, error } = await supabase
                    .from('students')
                    .select('id, full_name, phone, contract_number, category, status')
                    .order('created_at', { ascending: false });

                if (error) {
                    setStatus('Ошибка загрузки данных: ' + error.message, true);
                    studentsTableBody.innerHTML = `<tr><td colspan="5">Ошибка загрузки: ${error.message}</td></tr>`;
                    return;
                }

                if (!data || data.length === 0) {
                    setStatus('Данные не найдены.', true);
                    studentsTableBody.innerHTML = '<tr><td colspan="5">Нет данных</td></tr>';
                    return;
                }

                setStatus('Данные загружены.');
                studentsTableBody.innerHTML = data.map(student => `
                    <tr>
                        <td>${student.full_name || ''}</td>
                        <td>${student.phone || ''}</td>
                        <td>${student.contract_number || ''}</td>
                        <td>${student.category || ''}</td>
                        <td>${student.status || ''}</td>
                    </tr>
                `).join('');
            } catch (error) {
                setStatus('Ошибка: ' + error.message, true);
                studentsTableBody.innerHTML = `<tr><td colspan="5">Ошибка: ${error.message}</td></tr>`;
            }
        }

        async function checkSession() {
            if (isDemoMode()) {
                showCRM();
                return;
            }

            if (!supabase) {
                showLogin();
                return;
            }

            try {
                const {
                    data: { session },
                    error
                } = await supabase.auth.getSession();

                if (error) {
                    console.error('Session check error:', error.message);
                    showLogin();
                    return;
                }

                if (session) {
                    showCRM();
                } else {
                    showLogin();
                }
            } catch (error) {
                console.error('Error checking session:', error);
                showLogin();
            }
        }

        // Инициализация при загрузке страницы
        window.addEventListener('load', async () => {
            console.log('Page loaded');
            await initSupabase();
            await checkSession();
        });
    </script>
</body>
</html>
