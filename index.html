<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>CRM Автошкола</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .hidden { display: none; }
        form { margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background-color: #f4f4f4; }
    </style>
</head>
<body>

    <!-- 1. ФОРМА ВХОДА (показывается по умолчанию) -->
    <div id="login-block">
        <h2>Вход в CRM Автошколы</h2>
        <form id="login-form">
            <input type="email" id="email" placeholder="Email" required><br><br>
            <input type="password" id="password" placeholder="Пароль" required><br><br>
            <button type="submit">Войти</button>
        </form>
        <div id="status" style="font-size:0.9em; color:#666; margin-top:8px;">Войдите под своим аккаунтом для редактирования данных.</div>
    </div>

    <!-- 2. ИНТЕРФЕЙС CRM (скрыт до авторизации) -->
    <div id="crm-block" class="hidden">
        <h2>Список учеников автошколы</h2>
        <button id="logout-btn">Выйти из системы</button>
        
        <!-- ФОРМА ДОБАВЛЕНИЯ УЧЕНИКА -->
        <div id="add-student-container" style="display:none; background: #f9f9f9; padding: 15px; border: 1px solid #ddd; margin: 20px 0;">
            <h3>Добавить нового ученика</h3>
            <form id="add-student-form">
                <input type="text" id="new-name" placeholder="ФИО ученика" required>
                <input type="text" id="new-phone" placeholder="Телефон">
                <input type="text" id="new-contract" placeholder="№ Договора">
                
                <select id="new-category">
                    <option value="B">Категория B</option>
                    <option value="A">Категория A</option>
                    <option value="C">Категория C</option>
                </select>

                <button type="submit">Сохранить в базу</button>
            </form>
        </div>

        <table id="students-table">
            <thead>
                <tr>
                    <th>ФИО</th>
                    <th>Телефон</th>
                    <th>Договор</th>
                    <th>Категория</th>
                    <th>Статус</th>
                    <th>Действия</th>
                </tr>
            </thead>
            <tbody>
                <!-- Сюда JavaScript вставит данные из базы -->
            </tbody>
        </table>
    </div>

    <script>
        const SUPABASE_URL = 'https://xcqrluiqllsnhtyojuhc.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhjcXJsdWlxbGxzbmh0eW9qdWhjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEwMTI2MjMsImV4cCI6MjA5NjU4ODYyM30.UOQA2kSLI6-lmlbsHCKjbWuNi5gbSGRiJijWbtiqqdQ';
        const DEMO_ACCESS_KEY = null;

        let supabaseClient = null;
        let currentUser = null;
        let currentRole = null; // 'manager' | 'admin' | 'instructor'
        const loginBlock = document.getElementById('login-block');
        const crmBlock = document.getElementById('crm-block');
        const loginForm = document.getElementById('login-form');
        const logoutBtn = document.getElementById('logout-btn');
        const studentsTableBody = document.querySelector('#students-table tbody');

        // Инициализация Supabase с проверкой
        async function initSupabase() {
            if (typeof window.supabase !== 'undefined') {
                supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
                console.log('Supabase initialized successfully');
                return;
            }

            console.log('Ожидаем загрузки Supabase...');
            await new Promise((resolve) => {
                const interval = setInterval(() => {
                    if (typeof window.supabase !== 'undefined') {
                        clearInterval(interval);
                        clearTimeout(timeout);
                        resolve();
                    }
                }, 100);

                const timeout = setTimeout(() => {
                    clearInterval(interval);
                    console.warn('Supabase library did not load within 5 seconds.');
                    resolve();
                }, 5000);
            });

            if (typeof window.supabase !== 'undefined') {
                supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
                console.log('Supabase initialized after wait');
            }
        }

        function showLogin() {
            loginBlock.classList.remove('hidden');
            crmBlock.classList.add('hidden');
        }

        function showCRM() {
            loginBlock.classList.add('hidden');
            crmBlock.classList.remove('hidden');
            loadStudents();
        }

        async function loadStudents() {
            studentsTableBody.innerHTML = '<tr><td colspan="5">Загрузка данных...</td></tr>';

            if (!supabaseClient) {
                setStatus('Нужно войти для загрузки данных.', true);
                return;
            }

            try {
                const { data, error } = await supabaseClient
                    .from('students')
                    .select('id, full_name, phone, contract_number, category, status')
                    .order('created_at', { ascending: false });

                if (error) {
                    setStatus('Ошибка загрузки данных: ' + error.message, true);
                    studentsTableBody.innerHTML = `<tr><td colspan="5">Ошибка загрузки: ${error.message}</td></tr>`;
                    return;
                }

                if (!data || data.length === 0) {
                    setStatus('Данные не найдены.', true);
                    studentsTableBody.innerHTML = '<tr><td colspan="5">Нет данных</td></tr>';
                    return;
                }

                setStatus('Данные загружены.');
                studentsTableBody.innerHTML = data.map(student => `
                    <tr data-id="${student.id}">
                        <td class="s-full_name">${student.full_name || ''}</td>
                        <td class="s-phone">${student.phone || ''}</td>
                        <td class="s-contract">${student.contract_number || ''}</td>
                        <td class="s-category">${student.category || ''}</td>
                        <td class="s-status">${student.status || ''}</td>
                        <td class="s-actions"></td>
                    </tr>
                `).join('');
                renderRowActions();
            } catch (error) {
                setStatus('Ошибка: ' + error.message, true);
                studentsTableBody.innerHTML = `<tr><td colspan="5">Ошибка: ${error.message}</td></tr>`;
            }
        }

        // Получаем профиль и роль текущего пользователя из таблицы profiles
        async function getProfile() {
            try {
                const { data: user } = await supabaseClient.auth.getUser();
                currentUser = user && user.data ? user.data.user : null;
            } catch (e) {
                currentUser = null;
            }

            if (!currentUser) return;

            try {
                const { data, error } = await supabaseClient
                    .from('profiles')
                    .select('role')
                    .eq('id', currentUser.id)
                    .single();
                if (!error && data) {
                    currentRole = data.role;
                }
            } catch (e) {
                console.warn('profile fetch error', e.message);
            }
            setRoleUI();
        }

        function setRoleUI() {
            // Показываем форму добавления только менеджеру и админу
            const addContainer = document.getElementById('add-student-container');
            if (currentRole === 'manager' || currentRole === 'admin') {
                addContainer.style.display = 'block';
            } else {
                addContainer.style.display = 'none';
            }
            renderRowActions();
        }

        function renderRowActions() {
            document.querySelectorAll('#students-table tbody tr').forEach(tr => {
                const id = tr.getAttribute('data-id');
                const actionsTd = tr.querySelector('.s-actions');
                if (!actionsTd) return;
                actionsTd.innerHTML = '';
                if (currentRole === 'manager' || currentRole === 'admin') {
                    actionsTd.innerHTML += `<button class="edit-btn">Изменить</button> `;
                }
                if (currentRole === 'manager') {
                    actionsTd.innerHTML += `<button class="delete-btn">Удалить</button>`;
                }
            });
            // attach handlers
            document.querySelectorAll('.edit-btn').forEach(btn => btn.onclick = onEditRow);
            document.querySelectorAll('.delete-btn').forEach(btn => btn.onclick = onDeleteRow);
        }

        async function onEditRow(e) {
            const tr = e.target.closest('tr');
            const id = tr.getAttribute('data-id');
            // swap cells to inputs
            const nameCell = tr.querySelector('.s-full_name');
            const phoneCell = tr.querySelector('.s-phone');
            const contractCell = tr.querySelector('.s-contract');
            const categoryCell = tr.querySelector('.s-category');

            const name = nameCell.textContent;
            const phone = phoneCell.textContent;
            const contract = contractCell.textContent;
            const category = categoryCell.textContent;

            nameCell.innerHTML = `<input class="edit-name" value="${name}">`;
            phoneCell.innerHTML = `<input class="edit-phone" value="${phone}">`;
            contractCell.innerHTML = `<input class="edit-contract" value="${contract}">`;
            categoryCell.innerHTML = `<input class="edit-category" value="${category}">`;

            const actionsTd = tr.querySelector('.s-actions');
            actionsTd.innerHTML = `<button class="save-btn">Сохранить</button> <button class="cancel-btn">Отмена</button>`;
            actionsTd.querySelector('.save-btn').onclick = async () => {
                const updated = {
                    full_name: tr.querySelector('.edit-name').value,
                    phone: tr.querySelector('.edit-phone').value,
                    contract_number: tr.querySelector('.edit-contract').value,
                    category: tr.querySelector('.edit-category').value,
                };
                try {
                    const { error } = await supabaseClient.from('students').update(updated).eq('id', id);
                    if (error) throw error;
                    setStatus('Сохранено.');
                    await loadStudents();
                } catch (err) {
                    setStatus('Ошибка сохранения: ' + err.message, true);
                }
            };
            actionsTd.querySelector('.cancel-btn').onclick = () => loadStudents();
        }

        async function onDeleteRow(e) {
            if (!confirm('Удалить запись?')) return;
            const tr = e.target.closest('tr');
            const id = tr.getAttribute('data-id');
            try {
                const { error } = await supabaseClient.from('students').delete().eq('id', id);
                if (error) throw error;
                setStatus('Удалено.');
                await loadStudents();
            } catch (err) {
                setStatus('Ошибка удаления: ' + err.message, true);
            }
        }

        function getDemoKeyFromUrl() {
            return new URLSearchParams(window.location.search).get('demo');
        }

        function isDemoMode() {
            return localStorage.getItem('demoMode') === '1' || getDemoKeyFromUrl() === DEMO_ACCESS_KEY;
        }

        function enableDemoMode() {
            localStorage.setItem('demoMode', '1');
            showCRM();
            setStatus('Демо-режим активирован. Если данные не загружаются, отображаются демонстрационные данные.');
        }

        async function checkSession() {
            if (isDemoMode()) {
                showCRM();
                return;
            }

            if (!supabaseClient) {
                showLogin();
                return;
            }

            try {
                const {
                    data: { session },
                    error
                } = await supabaseClient.auth.getSession();

                if (error) {
                    console.error('Session check error:', error.message);
                    showLogin();
                    return;
                }

                if (session) {
                    showCRM();
                } else {
                    showLogin();
                }
            } catch (error) {
                console.error('Error checking session:', error);
                showLogin();
            }
        }

        loginForm.addEventListener('submit', async (event) => {
            event.preventDefault();
            
            if (!supabaseClient) {
                alert('Ошибка: Supabase не инициализирован');
                return;
            }

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                const { error } = await supabaseClient.auth.signInWithPassword({ email, password });
                if (error) {
                    alert('Ошибка входа: ' + error.message);
                    return;
                }
                showCRM();
            } catch (error) {
                alert('Ошибка входа: ' + error.message);
            }
        });

        logoutBtn.addEventListener('click', async () => {
            if (isDemoMode()) {
                localStorage.removeItem('demoMode');
                showLogin();
                return;
            }

            if (!supabaseClient) {
                showLogin();
                return;
            }

            try {
                const { error } = await supabaseClient.auth.signOut();
                if (error) {
                    alert('Ошибка при выходе: ' + error.message);
                    return;
                }
                showLogin();
            } catch (error) {
                alert('Ошибка при выходе: ' + error.message);
            }
        });

        // Обработчики для демо-доступа
        const demoSubmit = document.getElementById('demo-submit');
        const demoCodeInput = document.getElementById('demo-code');
        const statusElement = document.getElementById('status');

        function setStatus(text, error = false) {
            statusElement.textContent = text;
            statusElement.style.color = error ? '#c00' : '#666';
        }

        function renderFallbackData() {
            const sample = [{
                full_name: 'Демо Ученик',
                phone: '+7 900 000-00-00',
                contract_number: 'DEMO-001',
                category: 'B',
                status: 'Демонстрационный'
            }];
            studentsTableBody.innerHTML = sample.map(student => `
                <tr>
                    <td>${student.full_name}</td>
                    <td>${student.phone}</td>
                    <td>${student.contract_number}</td>
                    <td>${student.category}</td>
                    <td>${student.status}</td>
                </tr>
            `).join('');
        }

        demoSubmit.addEventListener('click', () => {
            const key = demoCodeInput.value.trim();
            if (key === DEMO_ACCESS_KEY) {
                enableDemoMode();
                setStatus('Доступ открыт. Если данные не загружаются, отображаются демонстрационные данные.');
            } else {
                setStatus('Неверный код доступа.', true);
                demoCodeInput.value = '';
                demoCodeInput.focus();
            }
        });

        // Позволяем Enter в поле ввода
        demoCodeInput.addEventListener('keydown', (event) => {
            if (event.key === 'Enter') {
                event.preventDefault();
                demoSubmit.click();
            }
        });

        // Инициализация при загрузке страницы
        window.addEventListener('load', async () => {
            console.log('Page loaded');
            await initSupabase();
            await checkSession();
        });
    </script>
</body>
</html>
