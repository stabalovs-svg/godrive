<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>CRM Автошкола</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .hidden { display: none; }
        form { margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background-color: #f4f4f4; }
    </style>
</head>
<body>

    <!-- 1. ФОРМА ВХОДА (показывается по умолчанию) -->
    <div id="login-block">
        <h2>Вход в CRM Автошколы</h2>
        <form id="login-form">
            <input type="email" id="email" placeholder="Email" required><br><br>
            <input type="password" id="password" placeholder="Пароль" required><br><br>
            <button type="submit">Войти</button>
        </form>
        <button id="demo-btn" type="button">Проверить код демодоступа</button>
        <div id="demo-block" style="margin-top:10px;">
            <input type="text" id="demo-code" placeholder="Введите код демодоступа" style="width:250px;">
            <button id="demo-submit" type="button">Открыть данные</button>
        </div>
        <p style="font-size:0.9em; color:#666; margin-top:8px;">Если вы владелец, введите свой код доступа и нажмите «Открыть данные».</p>
    </div>

    <!-- 2. ИНТЕРФЕЙС CRM (скрыт до авторизации) -->
    <div id="crm-block" class="hidden">
        <h2>Список учеников автошколы</h2>
        <button id="logout-btn">Выйти из системы</button>
        
        <table id="students-table">
            <thead>
                <tr>
                    <th>ФИО</th>
                    <th>Телефон</th>
                    <th>Договор</th>
                    <th>Категория</th>
                    <th>Статус</th>
                </tr>
            </thead>
            <tbody>
                <!-- Сюда JavaScript вставит данные из базы -->
            </tbody>
        </table>
    </div>

    <script>
        const SUPABASE_URL = 'https://xcqrluiqllsnhtyojuhc.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhjcXJsdWlxbGxzbmh0eW9qdWhjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEwMTI2MjMsImV4cCI6MjA5NjU4ODYyM30.UOQA2kSLI6-lmlbsHCKjbWuNi5gbSGRiJijWbtiqqdQ';
        const DEMO_ACCESS_KEY = 'godrive-demo';

        let supabase;
        const loginBlock = document.getElementById('login-block');
        const crmBlock = document.getElementById('crm-block');
        const loginForm = document.getElementById('login-form');
        const logoutBtn = document.getElementById('logout-btn');
        const studentsTableBody = document.querySelector('#students-table tbody');

        // Инициализация Supabase
        function initSupabase() {
            if (typeof window.supabase === 'undefined') {
                console.error('Supabase library not loaded');
                studentsTableBody.innerHTML = '<tr><td colspan="5">Ошибка: библиотека Supabase не загрузилась</td></tr>';
                return false;
            }
            supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            console.log('Supabase initialized');
            return true;
        }

        function showLogin() {
            loginBlock.classList.remove('hidden');
            crmBlock.classList.add('hidden');
        }

        function showCRM() {
            loginBlock.classList.add('hidden');
            crmBlock.classList.remove('hidden');
            loadStudents();
        }

        async function loadStudents() {
            studentsTableBody.innerHTML = '<tr><td colspan="5">Загрузка данных...</td></tr>';

            if (!supabase) {
                studentsTableBody.innerHTML = '<tr><td colspan="5">Ошибка: Supabase не инициализирован</td></tr>';
                return;
            }

            const { data, error } = await supabase
                .from('students')
                .select('id, full_name, phone, contract_number, category, status')
                .order('created_at', { ascending: false });

            if (error) {
                studentsTableBody.innerHTML = `<tr><td colspan="5">Ошибка загрузки: ${error.message}</td></tr>`;
                return;
            }

            if (!data || data.length === 0) {
                studentsTableBody.innerHTML = '<tr><td colspan="5">Нет данных</td></tr>';
                return;
            }

            studentsTableBody.innerHTML = data.map(student => `
                <tr>
                    <td>${student.full_name || ''}</td>
                    <td>${student.phone || ''}</td>
                    <td>${student.contract_number || ''}</td>
                    <td>${student.category || ''}</td>
                    <td>${student.status || ''}</td>
                </tr>
            `).join('');
        }

        function getDemoKeyFromUrl() {
            return new URLSearchParams(window.location.search).get('demo');
        }

        function isDemoMode() {
            return localStorage.getItem('demoMode') === '1' || getDemoKeyFromUrl() === DEMO_ACCESS_KEY;
        }

        function enableDemoMode() {
            localStorage.setItem('demoMode', '1');
            showCRM();
        }

        async function checkSession() {
            if (isDemoMode()) {
                showCRM();
                return;
            }

            if (!supabase) {
                console.error('Supabase not initialized');
                showLogin();
                return;
            }

            const {
                data: { session },
                error
            } = await supabase.auth.getSession();

            if (error) {
                console.error('Ошибка проверки сессии', error.message);
            }

            if (session) {
                showCRM();
            } else {
                showLogin();
            }
        }

        loginForm.addEventListener('submit', async (event) => {
            event.preventDefault();
            
            if (!supabase) {
                alert('Ошибка: Supabase не инициализирован');
                return;
            }

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            const { error } = await supabase.auth.signInWithPassword({ email, password });
            if (error) {
                alert('Ошибка входа: ' + error.message);
                return;
            }

            showCRM();
        });

        logoutBtn.addEventListener('click', async () => {
            if (isDemoMode()) {
                localStorage.removeItem('demoMode');
                showLogin();
                return;
            }

            if (!supabase) {
                showLogin();
                return;
            }

            const { error } = await supabase.auth.signOut();
            if (error) {
                alert('Ошибка при выходе: ' + error.message);
                return;
            }
            showLogin();
        });

        const demoBtn = document.getElementById('demo-btn');
        const demoSubmit = document.getElementById('demo-submit');
        const demoCodeInput = document.getElementById('demo-code');

        demoBtn.addEventListener('click', () => {
            console.log('Demo button clicked');
            demoCodeInput.focus();
        });

        demoSubmit.addEventListener('click', () => {
            const key = demoCodeInput.value.trim();
            console.log('Demo submit clicked, key:', key, 'expected:', DEMO_ACCESS_KEY);
            if (key === DEMO_ACCESS_KEY) {
                console.log('Access granted!');
                enableDemoMode();
            } else {
                alert('Неверный код доступа.');
            }
        });

        // Инициализация при загрузке страницы
        window.addEventListener('load', () => {
            console.log('Page loaded, initializing Supabase...');
            initSupabase();
            checkSession();
        });
    </script>
</body>
</html>
