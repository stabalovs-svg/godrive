<!DOCTYPE html>
<html lang="ru">

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRM Автошкола</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }

        .hidden {
            display: none;
        }

        form {
            margin-bottom: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th,
        td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: left;
        }

        th {
            background-color: #f4f4f4;
        }
    </style>
</head>

<body>

    <!-- 1. ФОРМА ВХОДА (показывается по умолчанию) -->
    <div id="login-block">
        <h2>Вход в CRM Автошколы</h2>
        <form id="login-form">
            <input type="email" id="email" placeholder="Email" required><br><br>
            <input type="password" id="password" placeholder="Пароль" required><br><br>
            <button type="submit" disabled>Войти</button>
        </form>
        <div id="status" style="font-size:0.9em; color:#666; margin-top:8px;">Войдите под своим аккаунтом для
            редактирования данных.</div>
    </div>

    <!-- 2. ИНТЕРФЕЙС CRM (скрыт до авторизации) -->
    <div id="crm-block" class="hidden">
        <h2>Список учеников автошколы</h2>
        <button id="logout-btn">Выйти из системы</button>

        <!-- ФОРМА ДОБАВЛЕНИЯ УЧЕНИКА -->
        <div id="add-student-container"
            style="display:none; background: #f9f9f9; padding: 15px; border: 1px solid #ddd; margin: 20px 0;">
            <h3>Добавить нового ученика</h3>
            <form id="add-student-form">
                <input type="text" id="new-name" placeholder="ФИО ученика" required>
                <input type="text" id="new-phone" placeholder="Телефон">
                <input type="text" id="new-contract" placeholder="№ Договора">

                <select id="new-category">
                    <option value="B">Категория B</option>
                    <option value="A">Категория A</option>
                    <option value="C">Категория C</option>
                </select>

                <button type="submit">Сохранить в базу</button>
            </form>
        </div>

        <table id="students-table">
            <thead>
                <tr>
                    <th>ФИО</th>
                    <th>Телефон</th>
                    <th>Договор</th>
                    <th>Категория</th>
                    <th>Статус</th>
                    <th>Действия</th>
                </tr>
            </thead>
            <tbody>
                <!-- Сюда JavaScript вставит данные из базы -->
            </tbody>
        </table>
    </div>

    <script>

     // Адаптивные стили для мобильных устройств
         @media (max-width: 768px) {

       body {
       padding: 10px;
       }

       table {
       font-size: 14px;
       }

       input,
       select,
       button {
           width: 100%;
           margin-bottom: 8px;
           box-sizing: border-box;
       }

    }

        // Version: 2026-06-10T21:00Z (cache buster - fixed session sync with onAuthStateChange)
        const SUPABASE_URL = 'https://xcqrluiqllsnhtyojuhc.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhjcXJsdWlxbGxzbmh0eW9qdWhjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEwMTI2MjMsImV4cCI6MjA5NjU4ODYyM30.UOQA2kSLI6-lmlbsHCKjbWuNi5gbSGRiJijWbtiqqdQ';

        let supabaseClient = null;
        let currentUser = null;
        let currentRole = null; // 'manager' | 'admin' | 'instructor'
        let loginBlock = null;
        let crmBlock = null;
        let loginForm = null;
        let logoutBtn = null;
        let statusElement = null;
        let addStudentForm = null;
        let studentsTableBody = null;

        // Инициализация Supabase с проверкой
        async function initSupabase() {
            if (typeof window.supabase !== 'undefined') {
                supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
                console.log('Supabase initialized successfully', { supabaseLoaded: true, supabaseClient: !!supabaseClient });

                // Слушатель изменений аутентификации
                if (supabaseClient.auth.onAuthStateChange) {
                    supabaseClient.auth.onAuthStateChange(async (event, session) => {
                        console.log('Auth state changed:', event, 'session:', !!session);
                        if (session && session.user) {
                            currentUser = session.user;
                            console.log('User logged in:', currentUser.email);
                            showCRM();
                            await getProfile();
                            await loadStudents();
                        } else {
                            currentUser = null;
                            currentRole = null;
                            console.log('User logged out');
                            showLogin();
                        }
                    });
                }
                return;
            }

            console.log('Ожидаем загрузки Supabase...');
            await new Promise((resolve) => {
                const interval = setInterval(() => {
                    if (typeof window.supabase !== 'undefined') {
                        clearInterval(interval);
                        clearTimeout(timeout);
                        resolve();
                    }
                }, 100);

                const timeout = setTimeout(() => {
                    clearInterval(interval);
                    console.warn('Supabase library did not load within 5 seconds.');
                    resolve();
                }, 5000);
            });

            if (typeof window.supabase !== 'undefined') {
                supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
                console.log('Supabase initialized after wait', { supabaseLoaded: true, supabaseClient: !!supabaseClient });
            }
        }

        function showLogin() {
            console.log('UI: showLogin called');
            currentUser = null;
            currentRole = null;
            loginBlock.classList.remove('hidden');
            crmBlock.classList.add('hidden');
            const addContainer = document.getElementById('add-student-container');
            if (addContainer) addContainer.style.display = 'none';
            if (studentsTableBody) {
                studentsTableBody.innerHTML = '<tr><td colspan="6">Войдите для просмотра данных.</td></tr>';
            }
            setStatus('Вы вышли из системы.');
        }

        function showCRM() {
            console.log('UI: showCRM called');
            loginBlock.classList.add('hidden');
            crmBlock.classList.remove('hidden');
            loadStudents();
        }

        async function loadStudents() {
            console.log('loadStudents called, supabaseClient:', !!supabaseClient);
            studentsTableBody.innerHTML = '<tr><td colspan="6">Загрузка данных...</td></tr>';

            if (!supabaseClient) {
                setStatus('Нужно войти для загрузки данных.', true);
                return;
            }

            try {
                const { data, error } = await supabaseClient
                    .from('students')
                    .select('id, full_name, phone, contract_number, category, status')
                    .order('created_at', { ascending: false });

                console.log('loadStudents: query result', { dataLength: data?.length, error });

                if (error) {
                    setStatus('Ошибка загрузки данных: ' + error.message, true);
                    studentsTableBody.innerHTML = `<tr><td colspan="6">Ошибка загрузки: ${error.message}</td></tr>`;
                    return;
                }

                if (!data || data.length === 0) {
                    setStatus('Данные не найдены.', true);
                    studentsTableBody.innerHTML = '<tr><td colspan="6">Нет данных</td></tr>';
                    console.log('loadStudents: no data returned');
                    return;
                }

                setStatus('Данные загружены.');
                studentsTableBody.innerHTML = data.map(student => `
                    <tr data-id="${student.id}">
                        <td class="s-full_name">${student.full_name || ''}</td>
                        <td class="s-phone">${student.phone || ''}</td>
                        <td class="s-contract">${student.contract_number || ''}</td>
                        <td class="s-category">${student.category || ''}</td>
                        <td class="s-status">${student.status || ''}</td>
                        <td class="s-actions"></td>
                    </tr>
                `).join('');
                console.log('loadStudents: rendered', data.length, 'rows. currentRole:', currentRole);
                renderRowActions();
            } catch (error) {
                setStatus('Ошибка: ' + error.message, true);
                studentsTableBody.innerHTML = `<tr><td colspan="6">Ошибка: ${error.message}</td></tr>`;
                console.error('loadStudents exception:', error);
            }
        }
        // Добавьте обработчик события отправки формы
        document.getElementById('add-student-container').addEventListener('submit', function (event) {
            event.preventDefault();
            const formData = new FormData(event.target);
            // Отправьте данные на сервер для добавления студента
            fetch('https://xcqrluiqllsnhtyojuhc.supabase.co', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(Object.fromEntries(formData))
            })
                .then(response => response.json())
                .then(data => {
                    // Обновите таблицу студентов после добавления нового студента
                    loadStudents();
                })
                .catch(error => {
                    console.error(error);
                });
        });

        // Получаем профиль и роль текущего пользователя из таблицы profiles
        async function getProfile() {
            try {
                const { data } = await supabaseClient.auth.getUser();
                currentUser = data?.user ?? null;
                console.log('getProfile: currentUser =', currentUser?.email || 'null');
            } catch (e) {
                console.warn('getUser error', e.message);
                currentUser = null;
            }

            if (!currentUser) {
                console.warn('getProfile: no current user');
                return;
            }

            try {
                const { data, error } = await supabaseClient
                    .from('profiles')
                    .select('role')
                    .eq('id', currentUser.id)
                    .single();
                console.log('getProfile: role query result', { data, error });
                if (!error && data) {
                    currentRole = data.role;
                    console.log('getProfile: role set to', currentRole);
                }
            } catch (e) {
                console.warn('profile fetch error', e.message);
            }
            setRoleUI();
        }

        function setRoleUI() {
            // Показываем форму добавления только менеджеру и админу
            const addContainer = document.getElementById('add-student-container');
            if (currentRole === 'manager' || currentRole === 'admin') {
                addContainer.style.display = 'block';
            } else {
                addContainer.style.display = 'none';
            }
            renderRowActions();
        }

        function renderRowActions() {
            document.querySelectorAll('#students-table tbody tr').forEach(tr => {
                const id = tr.getAttribute('data-id');
                const actionsTd = tr.querySelector('.s-actions');
                if (!actionsTd) return;
                actionsTd.innerHTML = '';
                if (currentRole === 'manager' || currentRole === 'admin') {
                    actionsTd.innerHTML += `<button class="edit-btn">Изменить</button> `;
                }
                if (currentRole === 'manager') {
                    actionsTd.innerHTML += `<button class="delete-btn">Удалить</button>`;
                }
            });
            // attach handlers
            document.querySelectorAll('.edit-btn').forEach(btn => btn.onclick = onEditRow);
            document.querySelectorAll('.delete-btn').forEach(btn => btn.onclick = onDeleteRow);
        }

        async function onEditRow(e) {
            const tr = e.target.closest('tr');
            const id = tr.getAttribute('data-id');
            // swap cells to inputs
            const nameCell = tr.querySelector('.s-full_name');
            const phoneCell = tr.querySelector('.s-phone');
            const contractCell = tr.querySelector('.s-contract');
            const categoryCell = tr.querySelector('.s-category');

            const name = nameCell.textContent;
            const phone = phoneCell.textContent;
            const contract = contractCell.textContent;
            const category = categoryCell.textContent;

            nameCell.innerHTML = `<input class="edit-name" value="${name}">`;
            phoneCell.innerHTML = `<input class="edit-phone" value="${phone}">`;
            contractCell.innerHTML = `<input class="edit-contract" value="${contract}">`;
            categoryCell.innerHTML = `<input class="edit-category" value="${category}">`;

            const actionsTd = tr.querySelector('.s-actions');
            actionsTd.innerHTML = `<button class="save-btn">Сохранить</button> <button class="cancel-btn">Отмена</button>`;
            actionsTd.querySelector('.save-btn').onclick = async () => {
                const updated = {
                    full_name: tr.querySelector('.edit-name').value,
                    phone: tr.querySelector('.edit-phone').value,
                    contract_number: tr.querySelector('.edit-contract').value,
                    category: tr.querySelector('.edit-category').value,
                };
                try {
                    const { error } = await supabaseClient.from('students').update(updated).eq('id', id);
                    if (error) throw error;
                    setStatus('Сохранено.');
                    await loadStudents();
                } catch (err) {
                    setStatus('Ошибка сохранения: ' + err.message, true);
                }
            };
            actionsTd.querySelector('.cancel-btn').onclick = () => loadStudents();
        }

        async function onDeleteRow(e) {
            if (!confirm('Удалить запись?')) return;
            const tr = e.target.closest('tr');
            const id = tr.getAttribute('data-id');
            try {
                const { error } = await supabaseClient.from('students').delete().eq('id', id);
                if (error) throw error;
                setStatus('Удалено.');
                await loadStudents();
            } catch (err) {
                setStatus('Ошибка удаления: ' + err.message, true);
            }
        }

        async function checkSession() {
            if (!supabaseClient) {
                showLogin();
                return;
            }

            try {
                const {
                    data: { session },
                    error
                } = await supabaseClient.auth.getSession();
                console.log('Session check result', { session, error });

                if (error) {
                    console.error('Session check error:', error.message);
                    showLogin();
                    return;
                }

                if (session) {
                    currentUser = session.user;
                    showCRM();
                    await getProfile();
                    await loadStudents();
                } else {
                    showLogin();
                }
            } catch (error) {
                console.error('Error checking session:', error);
                showLogin();
            }
        }

        function setStatus(text, error = false) {
            if (!statusElement) return;
            statusElement.textContent = text;
            statusElement.style.color = error ? '#c00' : '#666';
        }

        function initDomElements() {
            loginBlock = document.getElementById('login-block');
            crmBlock = document.getElementById('crm-block');
            loginForm = document.getElementById('login-form');
            logoutBtn = document.getElementById('logout-btn');
            statusElement = document.getElementById('status');
            addStudentForm = document.getElementById('add-student-form');
            studentsTableBody = document.querySelector('#students-table tbody');
            console.log('DOM elements initialized', {
                loginForm: !!loginForm,
                logoutBtn: !!logoutBtn,
                addStudentForm: !!addStudentForm,
                statusElement: !!statusElement,
                studentsTableBody: !!studentsTableBody
            });
        }

        function attachEventHandlers() {
            if (loginForm) {
                loginForm.addEventListener('submit', async (event) => {
                    event.preventDefault();

                    if (!supabaseClient) {
                        alert('Ошибка: Supabase не инициализирован');
                        return;
                    }

                    const email = document.getElementById('email').value;
                    const password = document.getElementById('password').value;

                    try {
                        const result = await supabaseClient.auth.signInWithPassword({ email, password });
                        console.log('signIn result', result);
                        if (result.error) {
                            setStatus('Ошибка входа: ' + result.error.message, true);
                            alert('Ошибка входа: ' + result.error.message);
                            return;
                        }
                        currentUser = result.data?.user ?? null;
                        if (currentUser) {
                            setStatus('Вход успешен. Загружаю профиль...');
                            showCRM();
                            await getProfile();
                            await loadStudents();
                        } else {
                            setStatus('Вход успешен. Ждем подтверждения сессии...');
                            showCRM();
                        }
                    } catch (error) {
                        setStatus('Ошибка входа: ' + error.message, true);
                        alert('Ошибка входа: ' + error.message);
                    }
                });
            } else {
                console.warn('login form element not found');
            }

            if (logoutBtn) {
                logoutBtn.type = 'button';
                logoutBtn.addEventListener('click', async () => {
                    console.log('Logout clicked');
                    if (!supabaseClient) {
                        showLogin();
                        return;
                    }

                    try {
                        const { error } = await supabaseClient.auth.signOut();
                        console.log('signOut result', { error });
                        if (error) {
                            alert('Ошибка при выходе: ' + error.message);
                            return;
                        }
                        const sessionCheck = await supabaseClient.auth.getSession();
                        console.log('After signOut session:', sessionCheck);
                        currentUser = null;
                        currentRole = null;
                        showLogin();
                    } catch (error) {
                        alert('Ошибка при выходе: ' + error.message);
                    }
                });
            } else {
                console.warn('logout button element not found');
            }

            if (addStudentForm) {
                addStudentForm.addEventListener('submit', async (e) => {
                    e.preventDefault();
                    if (!supabaseClient) {
                        setStatus('Нужно войти для добавления.', true);
                        return;
                    }
                    const full_name = document.getElementById('new-name').value.trim();
                    const phone = document.getElementById('new-phone').value.trim();
                    const contract_number = document.getElementById('new-contract').value.trim();
                    const category = document.getElementById('new-category').value;

                    try {
                        const { data, error } = await supabaseClient.from('students').insert([{ full_name, phone, contract_number, category }]);
                        if (error) {
                            setStatus('Ошибка добавления: ' + error.message, true);
                            return;
                        }
                        setStatus('Ученик добавлен.');
                        addStudentForm.reset();
                        await loadStudents();
                    } catch (err) {
                        setStatus('Ошибка: ' + err.message, true);
                    }
                });
            } else {
                console.warn('add student form element not found');
            }
        }

        // Инициализация при загрузке страницы
        async function startApp() {
            console.log('Page loaded');
            await initSupabase();
            console.log('Supabase init done, supabaseClient ready:', !!supabaseClient);
            initDomElements();
            attachEventHandlers();
            if (loginForm) {
                const submitBtn = loginForm.querySelector('button[type=submit]');
                if (submitBtn) {
                    submitBtn.disabled = false;
                    console.log('Login button enabled');
                }
            }
            await checkSession();
        }

        window.addEventListener('load', startApp);
    </script>
</body>

</html>
